<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트폰 리서치 애널리스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f4f6fb;
      color: #0d1b3e;
      -webkit-font-smoothing: antialiased;
      font-size: 13px;
    }
    button, input { font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(13,27,62,0.12); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(13,27,62,0.22); }
    input:focus, button:focus { outline: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─── Step definitions ────────────────────────────────────────────────
const STEP_DEFS = [
  { id: 1, name: '핵심질문',     desc: '토픽 분해 및 핵심 분석질문 도출' },
  { id: 2, name: '맥락 파악',    desc: 'What / Where / When / Who' },
  { id: 3, name: '플레이어',     desc: '주요 경쟁사별 현황 분석' },
  { id: 4, name: '임팩트',       desc: '정량적 시장 영향' },
  { id: 5, name: '리스크/기회',  desc: '플레이어별 리스크와 기회' },
  { id: 6, name: '결론',         desc: '전략적 시사점 도출' },
];

const ACCENT     = '#1a4fcc';
const TEXT_PRIM  = '#0d1b3e';
const TEXT_MUTE  = 'rgba(13,27,62,0.5)';
const TEXT_DIM   = 'rgba(13,27,62,0.3)';
const BORDER     = 'rgba(13,27,62,0.1)';
const BORDER_FG  = 'rgba(26,79,204,0.18)';
const BG_SUBTLE  = '#f8f9fc';
const BG_PANEL   = '#ffffff';

// ─── Mind Map ────────────────────────────────────────────────────────
const MM_NODE_H = 34;
const MM_LEAF_W = 148;
const MM_STEP_W = 116;
const MM_ROOT_W = 144;
const MM_SUBLEAF_W = 148;
const MM_ROW_GAP = 52;
const MM_TOP_PAD = 64;
const MM_X_ROOT = 16;
const MM_X_STEP = 200;
const MM_X_LEAF = 364;
const MM_X_SUBLEAF = 560;

function mmComputeLayout(treeData) {
  const { topic, steps } = treeData;
  let slotIdx = 0;

  const stepLayouts = steps.map(step => {
    const nodeLayouts = step.nodes.length > 0
      ? step.nodes.map((label, ni) => {
          const nd = (step.nodeData && step.nodeData[ni]) || {};
          const subs = (step.subnodes && step.subnodes[ni]) || [];
          const slots = subs.length > 0 ? subs.length : 1;
          const startSlot = slotIdx;
          slotIdx += slots;
          return { label, url: nd.url || null, rationale: nd.rationale || null, subs, startSlot, slots };
        })
      : [{ label: null, url: null, subs: [], startSlot: slotIdx++, slots: 1 }];

    const startSlot = nodeLayouts[0].startSlot;
    const totalSlots = nodeLayouts.reduce((s, n) => s + n.slots, 0);
    return { ...step, nodeLayouts, startSlot, totalSlots };
  });

  const svgHeight = Math.max(480, slotIdx * MM_ROW_GAP + MM_TOP_PAD * 2);
  const nodes = [], edges = [];

  stepLayouts.forEach(step => {
    step.nodeLayouts.forEach((nl, ni) => {
      if (!nl.label) return;
      const centerSlot = nl.startSlot + (nl.slots - 1) / 2;
      const leafY = MM_TOP_PAD + centerSlot * MM_ROW_GAP + MM_ROW_GAP / 2;
      const leafId = `leaf-${step.id}-${ni}`;
      nodes.push({ id: leafId, label: nl.label, url: nl.url || null, rationale: nl.rationale || null, type: 'leaf', x: MM_X_LEAF, y: leafY, stepId: step.id, status: step.status });
      edges.push({ from: `step-${step.id}`, to: leafId, status: step.status });

      nl.subs.forEach((subLabel, si) => {
        const subY = MM_TOP_PAD + (nl.startSlot + si) * MM_ROW_GAP + MM_ROW_GAP / 2;
        const subId = `subleaf-${step.id}-${ni}-${si}`;
        nodes.push({ id: subId, label: subLabel, type: 'subleaf', x: MM_X_SUBLEAF, y: subY, stepId: step.id, status: step.status });
        edges.push({ from: leafId, to: subId, status: step.status });
      });
    });

    const startY = MM_TOP_PAD + step.startSlot * MM_ROW_GAP + MM_ROW_GAP / 2;
    const endY   = MM_TOP_PAD + (step.startSlot + step.totalSlots - 1) * MM_ROW_GAP + MM_ROW_GAP / 2;
    nodes.push({ id: `step-${step.id}`, label: step.name, subtitle: step.subtitle || null, type: 'step', x: MM_X_STEP, y: (startY + endY) / 2, stepId: step.id, status: step.status });
    edges.push({ from: 'root', to: `step-${step.id}`, status: step.status });
  });

  nodes.push({ id: 'root', label: topic || '연구 주제', type: 'root', x: MM_X_ROOT, y: 20 });

  const hasSubleaves = nodes.some(n => n.type === 'subleaf');
  const hasLeaves    = nodes.some(n => n.type === 'leaf');
  const svgWidth = hasSubleaves ? MM_X_SUBLEAF + MM_SUBLEAF_W + 28
    : hasLeaves ? MM_X_LEAF + MM_LEAF_W + 28
    : MM_X_STEP + MM_STEP_W + 28;
  return { nodes, edges, svgHeight, svgWidth: Math.max(380, svgWidth) };
}

function MMEdge({ fromNode, toNode, status }) {
  if (!fromNode || !toNode) return null;
  const stroke = status === 'done' || status === 'active' ? ACCENT : 'rgba(13,27,62,0.18)';
  const opacity = status === 'done' ? 0.45 : status === 'active' ? 0.6 : 0.3;

  if (fromNode.type === 'root') {
    const bx = fromNode.x + 6;
    return <path d={`M${bx},${fromNode.y + 12} L${bx},${toNode.y} L${toNode.x},${toNode.y}`}
      fill="none" stroke={stroke} strokeWidth="1.5" opacity={opacity} />;
  }

  const fromW = fromNode.type === 'leaf' ? MM_LEAF_W : MM_STEP_W;
  const x1 = fromNode.x + fromW;
  const y1 = fromNode.y;
  const x2 = toNode.x;
  const y2 = toNode.y;
  const mx = (x1 + x2) / 2;
  return <path d={`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`} fill="none" stroke={stroke} strokeWidth="1.5" opacity={opacity} />;
}

function MMNode({ node, onNodeClick }) {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => setVisible(true), 40);
    return () => clearTimeout(t);
  }, []);

  if (node.type === 'root') {
    return (
      <g style={{ opacity: visible ? 1 : 0, transition: 'opacity 0.3s ease' }}>
        <circle cx={node.x + 6} cy={node.y} r={4} fill={ACCENT} />
        <text x={node.x + 16} y={node.y + 4.5}
          fontSize={13.5} fontWeight={600} fill={TEXT_PRIM}
          fontFamily="'Noto Sans KR', sans-serif"
          style={{ userSelect: 'none', pointerEvents: 'none' }}>
          {node.label}
        </text>
      </g>
    );
  }

  const w = node.type === 'step' ? MM_STEP_W : node.type === 'subleaf' ? MM_SUBLEAF_W : MM_LEAF_W;
  const { status, type } = node;
  const isDone    = status === 'done';
  const isActive  = status === 'active';
  const isPending = !isDone && !isActive;

  const isSubleaf = type === 'subleaf';

  const fill = isDone   ? (isSubleaf ? `${ACCENT}10` : `${ACCENT}1a`)
    : isActive ? `${ACCENT}08`
    : 'rgba(13,27,62,0.02)';

  const stroke = isDone || isActive ? (isSubleaf ? `${ACCENT}66` : ACCENT)
    : 'rgba(13,27,62,0.12)';

  const textFill = isPending ? TEXT_DIM
    : isSubleaf ? 'rgba(13,27,62,0.55)'
    : TEXT_PRIM;

  const maxChars = type === 'subleaf' ? 20 : type === 'leaf' ? 18 : 13;
  const displayLabel = node.label.length > maxChars
    ? node.label.slice(0, maxChars - 1) + '…'
    : node.label;

  const hasLink = !!node.url;
  const isDimLeaf = node.type === 'leaf' && node.stepId === 0;
  const isClickable = hasLink || (isDimLeaf && !!onNodeClick);
  return (
    <g
      style={{ opacity: visible ? 1 : 0, transition: 'opacity 0.3s ease', cursor: isClickable ? 'pointer' : 'default' }}
      onClick={() => {
        if (isDimLeaf && onNodeClick) onNodeClick(node);
        else if (hasLink) window.open(node.url, '_blank');
      }}
    >
      <rect x={node.x} y={node.y - MM_NODE_H / 2} width={w} height={MM_NODE_H}
        rx={7} fill={fill} stroke={hasLink ? ACCENT : stroke}
        strokeWidth={isActive ? 1.8 : hasLink ? 1.4 : 1.2}
        strokeDasharray={isPending ? '4 3' : 'none'} />
      {isActive && (<rect x={node.x} y={node.y - MM_NODE_H / 2} width={3.5} height={MM_NODE_H} rx={2} fill={ACCENT} />)}
      {isDone && type === 'step' && (
        <text x={node.x + w - 13} y={node.y + 4} fontSize={9} fill={ACCENT} textAnchor="middle" fontWeight="700" fontFamily="'Noto Sans KR', sans-serif">✓</text>
      )}
      <text x={node.x + (isActive ? 11 : 9)}
        y={node.y + 4}
        fontSize={type === 'step' ? 11 : 10.5}
        fontWeight={type === 'step' ? '500' : '400'}
        fill={textFill}
        textAnchor="start"
        fontFamily="'Noto Sans KR', sans-serif"
        style={{ userSelect: 'none', pointerEvents: 'none' }}>
        {displayLabel}
      </text>
      {node.rationale && type === 'leaf' && (() => {
        const rat = node.rationale;
        const line1 = rat.length > 22 ? rat.slice(0, 22) : rat;
        const line2 = rat.length > 22 ? (rat.slice(22, 44) + (rat.length > 44 ? '…' : '')) : null;
        return (
          <g style={{ userSelect: 'none', pointerEvents: 'none' }}>
            <text x={node.x + w / 2} y={node.y + MM_NODE_H / 2 + 10}
              fontSize={7} fill={TEXT_DIM} textAnchor="middle"
              fontFamily="'Noto Sans KR', sans-serif">
              {line1}
            </text>
            {line2 && (
              <text x={node.x + w / 2} y={node.y + MM_NODE_H / 2 + 19}
                fontSize={7} fill={TEXT_DIM} textAnchor="middle"
                fontFamily="'Noto Sans KR', sans-serif">
                {line2}
              </text>
            )}
          </g>
        );
      })()}
    </g>
  );
}

function MindMap({ treeData, onNodeClick }) {
  const containerRef = React.useRef(null);
  const [dims, setDims] = React.useState({ w: 400, h: 480 });
  const [pan, setPan] = React.useState({ x: 24, y: 40 });
  const [zoom, setZoom] = React.useState(1);
  const [isDragging, setIsDragging] = React.useState(false);
  const dragLast = React.useRef(null);
  const prevTopic = React.useRef(treeData.topic);

  React.useEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      setDims({ w: width, h: height });
    });
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, []);

  // reset view when a new topic starts
  React.useEffect(() => {
    if (treeData.topic !== prevTopic.current) {
      prevTopic.current = treeData.topic;
      setPan({ x: 24, y: 40 });
      setZoom(1);
    }
  }, [treeData.topic]);

  const { nodes, edges } = React.useMemo(
    () => mmComputeLayout(treeData),
    [JSON.stringify(treeData)]
  );

  const nodeMap = React.useMemo(() => {
    const m = {};
    nodes.forEach(n => { m[n.id] = n; });
    return m;
  }, [nodes]);

  function onMouseDown(e) {
    if (e.button !== 0) return;
    e.preventDefault();
    setIsDragging(true);
    dragLast.current = { x: e.clientX, y: e.clientY };
  }

  function onMouseMove(e) {
    if (!dragLast.current) return;
    const dx = e.clientX - dragLast.current.x;
    const dy = e.clientY - dragLast.current.y;
    dragLast.current = { x: e.clientX, y: e.clientY };
    setPan(p => ({ x: p.x + dx, y: p.y + dy }));
  }

  function onMouseUp() {
    setIsDragging(false);
    dragLast.current = null;
  }

  function onWheel(e) {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    setZoom(z => Math.max(0.25, Math.min(3, z * factor)));
  }

  return (
    <div
      ref={containerRef}
      style={{ flex: 1, minWidth: 0, height: '100%', position: 'relative', overflow: 'hidden',
        cursor: isDragging ? 'grabbing' : 'grab', userSelect: 'none' }}
      onMouseDown={onMouseDown}
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
      onMouseLeave={onMouseUp}
      onWheel={onWheel}
    >
      <svg width={dims.w} height={dims.h} style={{ display: 'block', position: 'absolute', inset: 0 }}>
        <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
          {edges.map(e => <MMEdge key={`${e.from}-${e.to}`} fromNode={nodeMap[e.from]} toNode={nodeMap[e.to]} status={e.status} />)}
          {nodes.map(n => <MMNode key={n.id} node={n} onNodeClick={onNodeClick} />)}
        </g>
      </svg>
      <div style={{ position: 'absolute', bottom: 12, right: 12, display: 'flex', gap: 5, alignItems: 'center' }}>
        <span style={{ fontSize: 10, color: TEXT_DIM }}>{Math.round(zoom * 100)}%</span>
        <button onClick={() => setZoom(z => Math.min(3, z * 1.2))} style={{
          background: 'rgba(255,255,255,0.92)', border: `1px solid ${BORDER}`,
          borderRadius: 5, width: 22, height: 22, fontSize: 14, lineHeight: 1,
          color: TEXT_MUTE, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>+</button>
        <button onClick={() => setZoom(z => Math.max(0.25, z / 1.2))} style={{
          background: 'rgba(255,255,255,0.92)', border: `1px solid ${BORDER}`,
          borderRadius: 5, width: 22, height: 22, fontSize: 14, lineHeight: 1,
          color: TEXT_MUTE, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>−</button>
        <button onClick={() => { setPan({ x: 24, y: 40 }); setZoom(1); }} style={{
          background: 'rgba(255,255,255,0.92)', border: `1px solid ${BORDER}`,
          borderRadius: 5, padding: '3px 7px', fontSize: 10,
          color: TEXT_MUTE, cursor: 'pointer',
        }}>재설정</button>
      </div>
    </div>
  );
}

// ─── Progress Bar ────────────────────────────────────────────────────
function ProgressBar({ steps }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 0 }}>
      {STEP_DEFS.map((def, i) => {
        const status = steps[i]?.status || 'pending';
        const isDone   = status === 'done';
        const isActive = status === 'active';
        return (
          <React.Fragment key={def.id}>
            <div title={`${def.id}단계: ${def.name} — ${def.desc}`} style={{
              display: 'flex', alignItems: 'center', gap: 5, padding: '4px 9px', borderRadius: 6,
              background: isActive ? `${ACCENT}14` : isDone ? `${ACCENT}0d` : 'transparent',
              border: `1px solid ${isActive || isDone ? ACCENT + '44' : 'transparent'}`,
              transition: 'all 0.3s',
            }}>
              <div style={{ position: 'relative', width: 18, height: 18, flexShrink: 0 }}>
                <div style={{
                  width: 18, height: 18, borderRadius: '50%',
                  border: `1.5px solid ${isDone || isActive ? ACCENT : 'rgba(13,27,62,0.18)'}`,
                  background: isDone ? ACCENT : isActive ? `${ACCENT}22` : 'transparent',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 8.5, fontWeight: 700,
                  color: isDone ? '#fff' : isActive ? ACCENT : 'rgba(13,27,62,0.3)',
                  transition: 'all 0.3s',
                }}>{isDone ? '✓' : def.id}</div>
                {isActive && (<div style={{
                  position: 'absolute', inset: -2, borderRadius: '50%',
                  border: `1.5px solid ${ACCENT}`,
                  animation: 'pingStep 1.5s ease-out infinite', pointerEvents: 'none',
                }} />)}
              </div>
              <span style={{
                fontSize: 11, fontWeight: isActive ? 500 : 400,
                color: isDone ? 'rgba(13,27,62,0.65)' : isActive ? TEXT_PRIM : 'rgba(13,27,62,0.3)',
                whiteSpace: 'nowrap', transition: 'color 0.3s',
              }}>{def.name}</span>
            </div>
            {i < 5 && (<div style={{
              width: 12, height: 1, flexShrink: 0,
              background: isDone ? `${ACCENT}55` : 'rgba(13,27,62,0.1)',
              transition: 'background 0.4s',
            }} />)}
          </React.Fragment>
        );
      })}
      <style>{`@keyframes pingStep{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2.2);opacity:0}}`}</style>
    </div>
  );
}

// ─── Reference Panel ─────────────────────────────────────────────────
function RefPanel({ links, onAddLink }) {
  const [url, setUrl]   = React.useState('');
  const [label, setLabel] = React.useState('');
  const [adding, setAdding] = React.useState(false);
  const [filter, setFilter] = React.useState(null);

  const filtered = filter !== null ? links.filter(l => l.step === filter) : links;
  const stepCounts = {};
  links.forEach(l => {
    if (l.step !== null && l.step !== undefined) stepCounts[l.step] = (stepCounts[l.step] || 0) + 1;
  });

  function handleAdd(e) {
    e.preventDefault();
    if (!url.trim()) return;
    onAddLink({ url: url.trim(), title: label.trim() || url.trim(), step: null, manual: true });
    setUrl(''); setLabel(''); setAdding(false);
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>
      <div style={{ padding: '12px 14px 10px', borderBottom: `1px solid ${BORDER}`, flexShrink: 0, background: BG_PANEL }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
          <span style={{ fontSize: 10.5, fontWeight: 600, letterSpacing: '0.07em', color: TEXT_DIM, textTransform: 'uppercase' }}>참고자료</span>
          <button onClick={() => setAdding(a => !a)} style={{
            background: adding ? `${ACCENT}14` : 'transparent',
            border: `1px solid ${BORDER_FG}`,
            color: ACCENT, borderRadius: 5, padding: '2px 8px',
            fontSize: 11, cursor: 'pointer',
          }}>{adding ? '닫기' : '+ 추가'}</button>
        </div>

        {links.length > 0 && (
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
            <Pill label={`전체 ${links.length}`} active={filter === null} onClick={() => setFilter(null)} />
            {Object.entries(stepCounts).map(([sid, cnt]) => (
              <Pill key={sid} label={`${parseInt(sid) === 0 ? 'P0' : `S${sid}`} · ${cnt}`}
                active={filter === parseInt(sid)}
                onClick={() => setFilter(filter === parseInt(sid) ? null : parseInt(sid))} />
            ))}
          </div>
        )}

        {adding && (
          <form onSubmit={handleAdd} style={{ marginTop: 10, display: 'flex', flexDirection: 'column', gap: 5 }}>
            <input placeholder="https://..." value={url} onChange={e => setUrl(e.target.value)} style={refInput} autoFocus />
            <input placeholder="라벨 (선택)" value={label} onChange={e => setLabel(e.target.value)} style={refInput} />
            <button type="submit" style={{
              background: ACCENT, border: 'none', color: '#fff',
              borderRadius: 5, padding: '5px 0', fontSize: 11, cursor: 'pointer', fontWeight: 500,
            }}>링크 추가</button>
          </form>
        )}
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '8px 8px', background: BG_SUBTLE }}>
        {filtered.length === 0 && (
          <div style={{ padding: '32px 12px', textAlign: 'center', color: TEXT_DIM, fontSize: 12, lineHeight: 1.6, whiteSpace: 'pre-line' }}>
            {links.length === 0 ? '분석이 진행되면\n참고자료가 수집됩니다' : '이 단계의 링크 없음'}
          </div>
        )}
        {filtered.map((link, i) => {
          let domain = '';
          try { domain = new URL(link.url).hostname.replace('www.', ''); } catch { domain = link.url; }
          return (
            <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" style={{
              display: 'block', padding: '8px 10px', marginBottom: 4,
              borderRadius: 7, background: BG_PANEL,
              border: `1px solid ${BORDER}`, textDecoration: 'none',
              transition: 'box-shadow 0.15s',
            }}
              onMouseEnter={e => e.currentTarget.style.boxShadow = '0 2px 8px rgba(13,27,62,0.08)'}
              onMouseLeave={e => e.currentTarget.style.boxShadow = 'none'}>
              <div style={{ display: 'flex', gap: 7 }}>
                <div style={{ width: 4, height: 4, borderRadius: '50%', background: link.manual ? TEXT_DIM : ACCENT, flexShrink: 0, marginTop: 5 }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                    fontSize: 11.5, fontWeight: 500, color: TEXT_PRIM, lineHeight: 1.35,
                    overflow: 'hidden', textOverflow: 'ellipsis',
                    display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical',
                  }}>{link.title}</div>
                  <div style={{ display: 'flex', gap: 5, marginTop: 3, alignItems: 'center' }}>
                    <span style={{ fontSize: 10, color: TEXT_DIM }}>{domain}</span>
                    {(link.step !== null && link.step !== undefined) && (<span style={{
                      fontSize: 9, color: ACCENT, padding: '1px 5px', lineHeight: 1.6,
                      borderRadius: 10, border: `1px solid ${ACCENT}55`,
                    }}>{link.step === 0 ? 'P0' : `S${link.step}`}</span>)}
                    {link.manual && (<span style={{
                      fontSize: 9, color: TEXT_DIM, padding: '1px 5px', lineHeight: 1.6,
                      borderRadius: 10, border: `1px solid ${BORDER}`,
                    }}>직접 추가</span>)}
                    {link.query && (<span style={{
                      fontSize: 9, color: TEXT_DIM, padding: '1px 5px', lineHeight: 1.6,
                      borderRadius: 10, border: `1px solid ${BORDER}`,
                      maxWidth: 110, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                    }}>{link.query}</span>)}
                  </div>
                  {link.summary && (
                    <div style={{
                      marginTop: 5, fontSize: 10.5, color: TEXT_MUTE, lineHeight: 1.45,
                      overflow: 'hidden', textOverflow: 'ellipsis',
                      display: '-webkit-box', WebkitLineClamp: 3, WebkitBoxOrient: 'vertical',
                    }}>
                      {link.summary}
                    </div>
                  )}
                </div>
              </div>
            </a>
          );
        })}
      </div>
    </div>
  );
}

function Pill({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      padding: '2px 8px', borderRadius: 20, fontSize: 10, cursor: 'pointer',
      border: `1px solid ${active ? ACCENT : ACCENT + '44'}`,
      background: active ? ACCENT + '18' : 'transparent',
      color: active ? ACCENT : ACCENT + 'aa',
      transition: 'all 0.15s',
    }}>{label}</button>
  );
}

const refInput = {
  background: BG_SUBTLE, border: `1px solid ${BORDER}`,
  borderRadius: 5, padding: '6px 8px',
  fontSize: 11, color: TEXT_PRIM, width: '100%',
};

// ─── Dim Detail Panel ────────────────────────────────────────────────
function DimDetailPanel({ mindmap, dimName, onClose }) {
  const dim = (mindmap?.dimensions || []).find(d => d.dimension === dimName);
  const linkages = (mindmap?.linkages || []).filter(
    l => l.from_dim === dimName || l.to_dim === dimName
  );
  const [openSub, setOpenSub] = React.useState(null);

  React.useEffect(() => { setOpenSub(null); }, [dimName]);

  if (!dim) return (
    <div style={{ width: 320, flexShrink: 0, borderLeft: `1px solid ${BORDER}`, background: BG_PANEL,
      display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ color: TEXT_DIM, fontSize: 12 }}>분석 결과 없음</div>
    </div>
  );

  return (
    <div style={{ width: 320, flexShrink: 0, borderLeft: `1px solid ${BORDER}`, background: BG_PANEL,
      display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ padding: '12px 14px 10px', borderBottom: `1px solid ${BORDER}`,
        display: 'flex', alignItems: 'flex-start', gap: 8, flexShrink: 0 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 9.5, color: TEXT_DIM, fontWeight: 600, textTransform: 'uppercase',
            letterSpacing: '0.07em', marginBottom: 4 }}>차원 분석</div>
          <div style={{ fontSize: 12.5, fontWeight: 600, color: TEXT_PRIM, lineHeight: 1.4 }}>{dim.dimension}</div>
        </div>
        <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer',
          color: TEXT_DIM, fontSize: 18, lineHeight: 1, flexShrink: 0, padding: '0 2px' }}>×</button>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '12px 14px' }}>
        {/* Headline */}
        {dim.headline && (
          <div style={{ background: `${ACCENT}0d`, border: `1px solid ${ACCENT}22`,
            borderRadius: 8, padding: '9px 12px', marginBottom: 14,
            fontSize: 11.5, color: TEXT_PRIM, lineHeight: 1.6 }}>
            {dim.headline}
          </div>
        )}

        {/* Subtopics */}
        <div style={{ fontSize: 9.5, color: TEXT_DIM, fontWeight: 600, textTransform: 'uppercase',
          letterSpacing: '0.07em', marginBottom: 8 }}>소주제 분석</div>
        {(dim.subtopics || []).map((sub, si) => (
          <div key={si} style={{ marginBottom: 6 }}>
            <button onClick={() => setOpenSub(openSub === si ? null : si)} style={{
              width: '100%', textAlign: 'left',
              background: openSub === si ? `${ACCENT}0d` : BG_SUBTLE,
              border: `1px solid ${openSub === si ? ACCENT + '33' : BORDER}`,
              borderRadius: 7, padding: '7px 10px',
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              transition: 'all 0.15s',
            }}>
              <span style={{ fontSize: 11, fontWeight: 500, color: TEXT_PRIM }}>{sub.label}</span>
              <span style={{ fontSize: 9.5, color: TEXT_DIM, marginLeft: 6, flexShrink: 0 }}>
                {sub.evidence?.length || 0}건 {openSub === si ? '▲' : '▼'}
              </span>
            </button>
            {openSub === si && (sub.evidence || []).map((ev, ei) => {
              let domain = '';
              try { domain = new URL(ev.source_url).hostname.replace('www.', ''); } catch {}
              return (
                <div key={ei} style={{ marginTop: 3, padding: '8px 10px',
                  background: '#f8f9fc', borderRadius: 6, border: `1px solid ${BORDER}` }}>
                  <div style={{ fontSize: 11, color: TEXT_PRIM, lineHeight: 1.55, marginBottom: 5 }}>{ev.finding}</div>
                  {ev.source_url && (
                    <a href={ev.source_url} target="_blank" rel="noopener noreferrer"
                      style={{ fontSize: 10, color: ACCENT, textDecoration: 'none',
                        display: 'inline-flex', alignItems: 'center', gap: 3 }}>
                      <span>↗</span> {domain}
                    </a>
                  )}
                </div>
              );
            })}
          </div>
        ))}

        {/* Linkages */}
        {linkages.length > 0 && (
          <>
            <div style={{ fontSize: 9.5, color: TEXT_DIM, fontWeight: 600, textTransform: 'uppercase',
              letterSpacing: '0.07em', marginTop: 16, marginBottom: 8 }}>차원 연계</div>
            {linkages.map((l, li) => {
              const isFrom = l.from_dim === dimName;
              const otherDim = isFrom ? l.to_dim : l.from_dim;
              return (
                <div key={li} style={{ marginBottom: 7, padding: '9px 11px',
                  background: `${ACCENT}06`, border: `1px solid ${ACCENT}22`, borderRadius: 7 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 4 }}>
                    <span style={{ fontSize: 10.5, color: ACCENT, fontWeight: 600 }}>{l.relationship}</span>
                    <span style={{ fontSize: 9, color: TEXT_DIM }}>
                      {isFrom ? '→' : '←'} {otherDim}
                    </span>
                  </div>
                  <div style={{ fontSize: 10.5, color: TEXT_MUTE, lineHeight: 1.55 }}>{l.causal_chain}</div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────
const INITIAL_STEPS = () => STEP_DEFS.map(d => ({ ...d, status: 'pending', nodes: [], subnodes: [], result: null }));

function App() {
  const [topic,    setTopic]    = React.useState('');
  const [inputVal, setInputVal] = React.useState('');
  const [steps,    setSteps]    = React.useState(INITIAL_STEPS);
  const [messages, setMessages] = React.useState([]);
  const [links,    setLinks]    = React.useState([]);
  const [running,  setRunning]  = React.useState(false);
  const [started,  setStarted]  = React.useState(false);
  const [perspMode, setPerspMode] = React.useState(false);
  const [perspVal,  setPerspVal]  = React.useState('');
  const [refCollapsed, setRefCollapsed] = React.useState(false);
  const [chatOpen,    setChatOpen]    = React.useState(false);
  const [chatTab,     setChatTab]     = React.useState('analysis'); // 'analysis' | 'methodology'
  const [phase0Links,   setPhase0Links]   = React.useState([]);
  const [phase0Status,  setPhase0Status]  = React.useState('pending');
  const [phase0Plan,    setPhase0Plan]    = React.useState(null);
  const [phase0Mindmap, setPhase0Mindmap] = React.useState(null);
  const [selectedDim,   setSelectedDim]   = React.useState(null);
  const [detailOpen,    setDetailOpen]    = React.useState(false);
  const [leftWidth,  setLeftWidth]  = React.useState(252);

  const [sessionId, setSessionId] = React.useState(null);
  const [awaiting,  setAwaiting]  = React.useState(null);   // null | 'plan' | 'step'
  const [lastDoneIdx, setLastDoneIdx] = React.useState(-1); // 0..5 = stepN-1
  const [isComplete, setIsComplete]   = React.useState(false);

  const chatRef  = React.useRef(null);
  const inputRef = React.useRef(null);
  const esRef    = React.useRef(null);

  function addMsg(msg) { setMessages(prev => [...prev, { ...msg, _id: Date.now() + Math.random() }]); }
  function removeThinking() { setMessages(prev => prev.filter(m => m.type !== 'thinking')); }
  function addLink(link) { setLinks(prev => [...prev, link]); }
  function updateStep(idx, patch) { setSteps(prev => prev.map((s, i) => i === idx ? { ...s, ...patch } : s)); }

  React.useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages]);
  React.useEffect(() => { if (!running && inputRef.current) inputRef.current.focus(); }, [running]);
  React.useEffect(() => () => { if (esRef.current) esRef.current.close(); }, []);

  function handleEvent(ev) {
    switch (ev.type) {
      case 'phase0_start':
        setPhase0Status('active');
        addMsg({ type: 'phase0_divider' });
        addMsg({ type: 'thinking' });
        break;
      case 'step_log':
        removeThinking();
        addMsg({ type: 'log', text: ev.text });
        break;
      case 'step_query':
        removeThinking();
        addMsg({ type: 'query', text: ev.text });
        break;
      case 'phase0_done':
        removeThinking();
        setPhase0Status('done');
        setPhase0Plan(ev.plan || null);
        setPhase0Mindmap(ev.mindmap || null);
        setPhase0Links(ev.pre_urls || []);
        if (ev.pre_urls && ev.pre_urls.length > 0) {
          setLinks(prev => {
            const seen = new Set(prev.map(l => l.url));
            const incoming = ev.pre_urls
              .filter(l => l.url && !seen.has(l.url))
              .map(l => ({
                url: l.url,
                title: l.title || l.url,
                summary: l.summary || '',
                query: l.query || '',
                tier: l.tier,
                step: 0,
                manual: false,
              }));
            return [...prev, ...incoming];
          });
        }
        addMsg({ type: 'plan_card', plan: ev.plan });
        break;
      case 'awaiting':
        setAwaiting(ev.kind);
        setRunning(false);
        break;
      case 'step_start': {
        const idx = ev.step_id - 1;
        addMsg({ type: 'divider', stepId: ev.step_id, stepName: ev.step_name });
        updateStep(idx, { status: 'active' });
        addMsg({ type: 'thinking' });
        break;
      }
      case 'step_done': {
        const idx = ev.step_id - 1;
        removeThinking();
        addMsg({ type: 'card', stepId: ev.step_id, stepIdx: idx, data: ev.result });
        updateStep(idx, { status: 'done', nodes: ev.result.nodes || [], subnodes: ev.result.subnodes || [] });
        setLastDoneIdx(idx);
        if (ev.step_id === 6) addMsg({ type: 'step-done', isLast: true });
        break;
      }
      case 'link':
        addLink({ url: ev.url, title: ev.title, step: ev.step, manual: false });
        break;
      case 'step_thinking':
        // thinking은 품질 향상용으로만 사용, UI에 표시하지 않음
        break;
      case 'report_questions':
        addMsg({ type: 'report-questions', questions: ev.questions });
        break;
      case 'data_gap':
        addMsg({ type: 'data-gap', dimension: ev.dimension, recommendation: ev.recommendation, paidRequired: ev.paid_source_required });
        break;
      case 'persp_queries':
        addMsg({ type: 'persp-queries', queries: ev.queries });
        break;
      case 'error':
        removeThinking();
        addMsg({ type: 'error', text: ev.text });
        setRunning(false);
        setAwaiting(null);
        break;
      case 'done':
        setIsComplete(true);
        setRunning(false);
        setAwaiting(null);
        if (esRef.current) { esRef.current.close(); esRef.current = null; }
        break;
      case 'cancelled':
        addMsg({ type: 'log', text: '분석이 취소되었습니다.' });
        setRunning(false);
        setAwaiting(null);
        if (esRef.current) { esRef.current.close(); esRef.current = null; }
        break;
    }
  }

  async function startAnalysis() {
    const t = inputVal.trim();
    if (!t) return;
    setTopic(t); setStarted(true); setRunning(true);
    setAwaiting(null); setPerspMode(false); setPerspVal('');
    setSteps(INITIAL_STEPS()); setMessages([]); setLinks([]);
    setLastDoneIdx(-1); setIsComplete(false);
    setPhase0Links([]); setPhase0Status('pending'); setChatOpen(true);
    setPhase0Mindmap(null); setSelectedDim(null); setDetailOpen(false);

    if (esRef.current) { esRef.current.close(); esRef.current = null; }

    try {
      const resp = await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic: t }),
      });
      if (!resp.ok) throw new Error(await resp.text());
      const data = await resp.json();
      setSessionId(data.session_id);

      const es = new EventSource(`/api/stream/${data.session_id}`);
      es.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); } catch {}
      };
      es.onerror = () => { /* let it retry; we'll close on done/cancelled */ };
      esRef.current = es;
    } catch (e) {
      addMsg({ type: 'error', text: '서버 연결 실패: ' + e.message });
      setRunning(false);
      setStarted(false);
    }
  }

  async function callProceed(perspective) {
    if (!sessionId) return;
    setRunning(true); setAwaiting(null);
    const manualLinks = links.filter(l => l.manual).map(l => l.url);
    try {
      await fetch('/api/proceed', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, perspective: perspective || null, manual_links: manualLinks }),
      });
    } catch (e) {
      addMsg({ type: 'error', text: '요청 실패: ' + e.message });
      setRunning(false);
    }
  }

  function proceed() {
    setPerspMode(false); setPerspVal('');
    callProceed(null);
  }

  function applyPerspective() {
    const p = perspVal.trim();
    if (!p) return;
    setPerspMode(false); setPerspVal('');
    addMsg({ type: 'persp-applied', text: p });
    callProceed(p);
  }

  async function cancelAnalysis() {
    if (!sessionId) return;
    try {
      await fetch('/api/cancel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      });
    } catch {}
    if (esRef.current) { esRef.current.close(); esRef.current = null; }
    setRunning(false); setAwaiting(null);
  }

  function handleBottomKey(e) {
    if (e.key === 'Enter') {
      if (!started) startAnalysis();
      else if (perspMode && awaiting === 'step') applyPerspective();
    }
  }

  const treeData = React.useMemo(() => ({
    topic: topic || '연구 주제',
    steps: [
      ...(started ? [{
        id: 0, name: '연구계획', status: phase0Status,
        nodes: (phase0Plan?.key_dimensions || []),
        subnodes: (phase0Plan?.key_dimensions || []).map((_, i) =>
          phase0Plan?.step1_queries_grouped?.[i] ||
          (phase0Plan?.step1_queries?.slice(i * 3, i * 3 + 3) || [])
        ),
        nodeData: (phase0Plan?.key_dimensions || []).map((dim) => ({
          url: null,
          rationale: (phase0Plan?.dimension_rationale?.[dim] || ''),
        })),
      }] : []),
      ...steps.map(s => ({ id: s.id, name: s.name, status: s.status, nodes: s.nodes, subnodes: s.subnodes || [] })),
    ],
  }), [topic, steps, phase0Status, phase0Links, phase0Plan, started]);

  const canProceedPlan = !running && awaiting === 'plan';
  const canProceedStep = !running && awaiting === 'step' && lastDoneIdx < 5;
  const showPersp = perspMode && canProceedStep;

  const proceedLabel = awaiting === 'plan'
    ? '분석 시작'
    : `${lastDoneIdx + 2}단계로 계속`;

  const inputDisabled = running || isComplete || (started && !perspMode && awaiting !== 'step');

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden', background: '#eef1f8' }}>

      {/* Top bar */}
      <div style={{
        height: 50, flexShrink: 0,
        display: 'flex', alignItems: 'center', gap: 12, padding: '0 18px',
        borderBottom: `1px solid ${BORDER}`, background: BG_PANEL,
        boxShadow: '0 1px 3px rgba(13,27,62,0.04)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
          <div style={{
            width: 24, height: 24, borderRadius: 6, background: ACCENT,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <div style={{ width: 10, height: 14, borderRadius: 2, border: '1.5px solid #fff' }} />
          </div>
          <span style={{ fontSize: 13, fontWeight: 600, color: TEXT_PRIM, letterSpacing: '-0.01em' }}>
            스마트폰 리서치 애널리스트
          </span>
        </div>
        <div style={{ width: 1, height: 20, background: BORDER, flexShrink: 0 }} />

        {started && (
          <>
            <div style={{ flex: 1, minWidth: 0 }} />
            <ProgressBar steps={steps} />
          </>
        )}
        {!started && <div style={{ flex: 1 }} />}

        <div style={{ display: 'flex', gap: 5, flexShrink: 0, marginLeft: started ? 12 : 'auto' }}>
          <PanelBtn label="참고자료" active={!refCollapsed} onClick={() => setRefCollapsed(v => !v)} />
          <PanelBtn label="방법론" active={chatOpen && chatTab === 'methodology'} onClick={() => { setChatTab('methodology'); setChatOpen(true); }} />
        </div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>

        {/* Left ref panel */}
        {!refCollapsed && (
          <>
            <div style={{
              width: leftWidth, flexShrink: 0,
              background: BG_SUBTLE, display: 'flex', flexDirection: 'column', overflow: 'hidden',
            }}>
              <RefPanel links={links} onAddLink={addLink} />
            </div>
            <ResizeHandle onDrag={d => setLeftWidth(w => Math.max(160, Math.min(500, w + d)))} />
          </>
        )}

        {/* Main area: intro before start, mindmap after */}
        <div style={{ flex: 1, overflow: 'hidden', background: BG_PANEL, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          {!started ? (
            <>
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'auto' }}>
                <IntroScreen />
              </div>
              <div style={{ flexShrink: 0, borderTop: `1px solid ${BORDER}`, background: BG_PANEL, padding: '10px 20px 12px' }}>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <input ref={inputRef}
                    value={inputVal}
                    onChange={e => setInputVal(e.target.value)}
                    onKeyDown={handleBottomKey}
                    placeholder="연구 주제를 입력하세요 — 예: 아이폰 폴더블 출시"
                    style={{
                      flex: 1, background: '#f4f6fb',
                      border: `1px solid ${ACCENT}4d`,
                      borderRadius: 8, padding: '9px 14px',
                      fontSize: 13, color: TEXT_PRIM, transition: 'border-color 0.2s',
                    }} />
                  <button onClick={startAnalysis} disabled={!inputVal.trim()} style={{
                    background: inputVal.trim() ? ACCENT : `${ACCENT}1f`,
                    border: 'none', borderRadius: 8, padding: '9px 18px',
                    fontSize: 13, fontWeight: 600,
                    color: inputVal.trim() ? '#fff' : `${ACCENT}59`,
                    cursor: inputVal.trim() ? 'pointer' : 'default',
                    transition: 'all 0.2s', flexShrink: 0,
                  }}>분석 시작</button>
                </div>
              </div>
            </>
          ) : (
            <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
              <MindMap treeData={treeData} onNodeClick={(node) => {
                setSelectedDim(node.label);
                setDetailOpen(true);
              }} />
              {detailOpen && selectedDim && (
                <DimDetailPanel
                  mindmap={phase0Mindmap}
                  dimName={selectedDim}
                  onClose={() => setDetailOpen(false)}
                />
              )}
            </div>
          )}
        </div>

      </div>

      {/* Floating chat button */}
      {started && (
        <button onClick={() => setChatOpen(v => !v)} style={{
          position: 'fixed', bottom: 22, right: 22,
          width: 52, height: 52, borderRadius: '50%',
          background: chatOpen ? TEXT_PRIM : ACCENT,
          border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          boxShadow: '0 4px 18px rgba(13,27,62,0.28)',
          zIndex: 200, transition: 'background 0.2s',
          fontSize: 22, color: '#fff',
        }}>
          {chatOpen ? '✕' : '💬'}
          {!chatOpen && running && (
            <div style={{
              position: 'absolute', top: 5, right: 5,
              width: 10, height: 10, borderRadius: '50%',
              background: '#22c55e', border: '2px solid #fff',
            }} />
          )}
        </button>
      )}

      {/* Chat overlay popup */}
      {chatOpen && (
        <div style={{
          position: 'fixed', bottom: 84, right: 22,
          width: 480, height: '75vh', maxHeight: 'calc(100vh - 120px)',
          background: BG_PANEL, borderRadius: 12,
          boxShadow: '0 8px 40px rgba(13,27,62,0.18)',
          border: `1px solid ${BORDER}`,
          display: 'flex', flexDirection: 'column', overflow: 'hidden',
          zIndex: 199,
        }}>
          {/* ── Popup header with tabs ── */}
          <div style={{ borderBottom: `1px solid ${BORDER}`, flexShrink: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', padding: '9px 14px 0', justifyContent: 'space-between' }}>
              <div style={{ display: 'flex', gap: 0 }}>
                {[['analysis', '분석 현황'], ['methodology', '연구 방법론']].map(([key, label]) => (
                  <button key={key} onClick={() => setChatTab(key)} style={{
                    background: 'none', border: 'none', cursor: 'pointer',
                    padding: '4px 12px 8px', fontSize: 11.5,
                    fontWeight: chatTab === key ? 600 : 400,
                    color: chatTab === key ? ACCENT : TEXT_MUTE,
                    borderBottom: chatTab === key ? `2px solid ${ACCENT}` : '2px solid transparent',
                    transition: 'all 0.15s', marginBottom: -1,
                  }}>{label}</button>
                ))}
              </div>
              <button onClick={() => setChatOpen(false)} style={{
                background: 'none', border: 'none', cursor: 'pointer',
                color: TEXT_MUTE, fontSize: 18, lineHeight: 1, padding: '0 2px',
              }}>×</button>
            </div>
          </div>

          {chatTab === 'analysis' ? (
            <div ref={chatRef} style={{ flex: 1, overflowY: 'auto', padding: '16px 0 8px' }}>
              {messages.map(msg => <MsgRow key={msg._id} msg={msg} onProceed={proceed} onCancel={cancelAnalysis} />)}
            </div>
          ) : (
            <div style={{ flex: 1, overflowY: 'auto' }}>

function ResizeHandle({ onDrag }) {
  const [hovered, setHovered] = React.useState(false);
  const [dragging, setDragging] = React.useState(false);

  function handleMouseDown(e) {
    e.preventDefault();
    setDragging(true);
    let lastX = e.clientX;
    function onMove(e) {
      const delta = e.clientX - lastX;
      lastX = e.clientX;
      onDrag(delta);
    }
    function onUp() {
      setDragging(false);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }

  return (
    <div
      onMouseDown={handleMouseDown}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        width: 5, flexShrink: 0, cursor: 'col-resize', position: 'relative',
        background: (dragging || hovered) ? `${ACCENT}33` : BORDER,
        transition: 'background 0.15s',
        zIndex: 10,
      }}
    >
      {(hovered || dragging) && (
        <div style={{
          position: 'absolute', top: '50%', left: '50%',
          transform: 'translate(-50%, -50%)',
          width: 3, height: 24, borderRadius: 2,
          background: ACCENT, opacity: 0.6,
        }} />
      )}
    </div>
  );
}

  const STEPS = [
    {
      label: 'Step A — 영문 키워드 변환',
      icon: '🔤',
      desc: '입력한 한국어 토픽을 LLM이 영문 검색 쿼리 3-4개로 변환합니다.',
      detail: '예: "아이폰 폴더블 출시" → ["iPhone foldable launch 2026", "Apple foldable phone specs", ...]',
    },
    {
      label: 'Step B — 사전 검색',
      icon: '🔍',
      desc: '변환된 쿼리로 RSS 피드(22개 소스) + DuckDuckGo에서 최신 기사를 병렬 수집합니다.',
      detail: '각 소스에서 최대 3건, 전체 최대 30건. 관련도 점수(C+ scoring)로 필터링.',
    },
    {
      label: 'Step C — 핵심차원 선정 (Pass 1)',
      icon: '🧠',
      desc: '수집된 기사를 바탕으로 LLM이 분석 가치가 높은 핵심차원 2-3개와 선정 근거를 생성합니다.',
      detail: '기사 내용에 근거해 차원 선정 — 공급망 이슈가 많으면 공급망 차원이 선정됨.',
    },
    {
      label: 'Step D — 쿼리 생성 (Pass 2)',
      icon: '🔎',
      desc: '선정된 차원과 근거를 바탕으로 3-lens 규칙에 따라 차원별 쿼리 3개를 생성합니다.',
      detail: 'Q1 현황/뉴스 · Q2 플레이어 대응 · Q3 시장 수치 — 각 차원당 고정 렌즈 적용.',
    },
  ];

  const DIM_RULES = [
    '토픽이 단순하거나 명확한 경우 → 2개',
    '토픽이 복잡하거나 분석 차원이 3개인 경우 → 3개',
    'key_dimensions / dimension_rationale / step1_queries_grouped 수 반드시 일치',
  ];

  const QUERY_RULES = [
    'English only — no Korean in any query field',
    'Include specific product names, company names, or figures',
    'Include current year or "latest" for recency',
    '차원별 3개 쿼리는 고정 렌즈로 배분:',
    '  Q1 현황/뉴스 — latest news, announcements, facts',
    '  Q2 플레이어 대응 — Samsung/Apple/OEM response & strategy',
    '  Q3 시장 수치 — market share, shipment, forecast, pricing data',
  ];

  const S = { // style shortcuts
    section: { padding: '14px 16px', borderBottom: `1px solid ${BORDER}` },
    label: { fontSize: 10, fontWeight: 700, color: ACCENT, textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 8 },
    stepRow: { display: 'flex', gap: 10, marginBottom: 10 },
    iconBox: { width: 28, height: 28, borderRadius: 7, background: `${ACCENT}10`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 14 },
    stepLabel: { fontSize: 11, fontWeight: 600, color: TEXT_PRIM, marginBottom: 2 },
    stepDesc: { fontSize: 10.5, color: TEXT_MUTE, lineHeight: 1.5 },
    stepDetail: { fontSize: 10, color: TEXT_DIM, lineHeight: 1.5, marginTop: 3 },
    bullet: { fontSize: 10.5, color: TEXT_MUTE, paddingLeft: 8, marginBottom: 2 },
    warn: { fontSize: 10.5, color: '#e67e22', paddingLeft: 8, marginBottom: 2 },
  };

  return (
    <div style={{ fontSize: 12 }}>
      {/* 플랜 수립 프로세스 */}
      <div style={S.section}>
        <div style={S.label}>플랜 수립 프로세스</div>
        {STEPS.map((s, i) => (
          <div key={i} style={S.stepRow}>
            <div style={S.iconBox}>{s.icon}</div>
            <div>
              <div style={S.stepLabel}>{s.label}</div>
              <div style={S.stepDesc}>{s.desc}</div>
              <div style={S.stepDetail}>{s.detail}</div>
            </div>
          </div>
        ))}
      </div>

      {/* 핵심차원 선정 기준 */}
      <div style={S.section}>
        <div style={S.label}>핵심차원 선정 기준</div>
        <div style={{ fontSize: 10.5, color: TEXT_MUTE, marginBottom: 6 }}>
          수집된 기사 컨텍스트를 바탕으로 LLM이 토픽의 시장 영향을 가장 잘 설명하는 차원을 선택합니다.
        </div>
        {DIM_RULES.map((r, i) => (
          <div key={i} style={S.bullet}>· {r}</div>
        ))}
      </div>

      {/* 쿼리 선정 기준 */}
      <div style={S.section}>
        <div style={S.label}>쿼리 선정 기준</div>
        {QUERY_RULES.map((r, i) => (
          <div key={i} style={r.startsWith('⚠') ? S.warn : S.bullet}>{r}</div>
        ))}
      </div>

      {/* 실제 플랜 결과 (있을 때만) */}
      {plan && (
        <div style={S.section}>
          <div style={S.label}>현재 플랜 상세</div>
          <div style={{ fontSize: 10.5, color: TEXT_MUTE, marginBottom: 4 }}>
            <span style={{ fontWeight: 600, color: TEXT_PRIM }}>차원 수: </span>{(plan.key_dimensions || []).length}개
          </div>
          {(plan.key_dimensions || []).map((dim, i) => {
            const grouped = (plan.step1_queries_grouped || [])[i] || [];
            return (
              <div key={i} style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: TEXT_PRIM }}>{i + 1}. {dim}</div>
                <div style={{ fontSize: 10, color: TEXT_DIM, marginBottom: 3 }}>
                  {(plan.dimension_rationale || {})[dim] || ''}
                </div>
                {grouped.map((q, qi) => (
                  <div key={qi} style={{ fontSize: 10.5, color: ACCENT, paddingLeft: 8 }}>· {q}</div>
                ))}
              </div>
            );
          })}
        </div>
      )}

      {/* 프롬프트 원문 토글 */}
      <div style={{ padding: '10px 16px' }}>
        <button onClick={() => setPromptOpen(v => !v)} style={{
          background: 'none', border: `1px solid ${BORDER}`, borderRadius: 6,
          padding: '5px 12px', fontSize: 10.5, color: TEXT_MUTE, cursor: 'pointer', width: '100%',
        }}>
          {promptOpen ? '▲ PLANNING_PROMPT 숨기기' : '▼ PLANNING_PROMPT 원문 보기'}
        </button>
        {promptOpen && (
          <pre style={{
            marginTop: 8, padding: 10, background: BG_SUBTLE,
            borderRadius: 6, fontSize: 9.5, color: TEXT_MUTE,
            whiteSpace: 'pre-wrap', lineHeight: 1.6, overflowX: 'auto',
            border: `1px solid ${BORDER}`,
          }}>{`You are a smartphone market analyst. Build a structured research plan for the topic below.

Topic: "{topic}"
Current year: {current_year}

The following are the latest news articles and data retrieved for this topic. Use them to inform your plan:
---
{pre_search_context}
---

Respond with ONLY a valid JSON object (no markdown, no code blocks):

{
  "analysis_rationale": "<Why this topic matters — 2-3 sentences IN KOREAN>",
  "key_dimensions": ["<Dimension 1 IN KOREAN>", "<Dimension 2 IN KOREAN>"],
  "dimension_rationale": {
    "<Dimension 1>": "<Why essential — 1-2 sentences IN KOREAN>",
    "<Dimension 2>": "<Why essential — 1-2 sentences IN KOREAN>"
  },
  "step1_queries_grouped": [
    ["dim1 query 1", "dim1 query 2", "dim1 query 3"],
    ["dim2 query 1", "dim2 query 2", "dim2 query 3"]
  ],
  ...
}

Rules for key_dimensions count:
- 2 dims: straightforward topic
- 3 dims: complex topic with 3 well-separated angles
- key_dimensions / dimension_rationale / step1_queries_grouped must have the same count

Rules for ALL search queries: English only, specific product/company names,
include current year or "latest", match topic type:
  launch → "launch specs price review release date"
  regulation → "regulation compliance deadline impact"
  market → "market share shipment forecast data"

Language: text fields (rationale, dimensions) → KOREAN
         all query arrays → ENGLISH only`}</pre>
        )}
      </div>
    </div>
  );
}

// ─── Step Result Card ────────────────────────────────────────────────
function ResultCard({ stepId, stepIdx, data }) {
  const [vis, setVis] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setVis(true), 60); return () => clearTimeout(t); }, []);
  const isStep1 = stepId === 1;
  const isStep2 = stepId === 2;
  const findings = data.findings || [];
  const nodes = data.nodes || [];
  const subnodes = data.subnodes || [];

  return (
    <div style={{
      padding: '12px 40px',
      opacity: vis ? 1 : 0, transform: vis ? 'none' : 'translateY(6px)',
      transition: 'all 0.3s ease',
    }}>
      <div style={{
        background: BG_PANEL, border: `1px solid ${ACCENT}28`,
        borderRadius: 10, overflow: 'hidden',
        boxShadow: `0 2px 12px ${ACCENT}0d`,
      }}>
        <div style={{
          padding: '9px 16px', borderBottom: `1px solid ${ACCENT}18`,
          background: `${ACCENT}08`,
          display: 'flex', alignItems: 'center', gap: 8,
        }}>
          <div style={{ width: 7, height: 7, borderRadius: '50%', background: ACCENT, flexShrink: 0 }} />
          <span style={{ fontSize: 12, fontWeight: 600, color: TEXT_PRIM }}>{data.title}</span>
        </div>

        {isStep2 && findings.length === 4 ? (
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr' }}>
            {findings.map((f, i) => (
              <div key={i} style={{
                padding: '10px 16px',
                borderRight: i % 2 === 0 ? `1px solid ${ACCENT}12` : 'none',
                borderBottom: i < 2 ? `1px solid ${ACCENT}12` : 'none',
              }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: ACCENT, textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 4 }}>{f.label}</div>
                <div style={{ fontSize: 12, color: 'rgba(13,27,62,0.7)', lineHeight: 1.45 }}>{f.detail}</div>
              </div>
            ))}
          </div>
        ) : (
          <div>
            {findings.map((f, i) => {
              const qMatch = isStep1 && f.label ? f.label.match(/핵심질문\s*(\d)/) : null;
              const qIdx = qMatch ? parseInt(qMatch[1]) - 1 : -1;
              const subs = qIdx >= 0 ? (subnodes[qIdx] || []) : [];
              return (
                <React.Fragment key={i}>
                  <div style={{
                    display: 'flex', gap: 10, padding: '8px 16px',
                    borderBottom: subs.length === 0 && i < findings.length - 1 ? `1px solid rgba(13,27,62,0.05)` : 'none',
                  }}>
                    <div style={{
                      width: 18, height: 18, borderRadius: 5, flexShrink: 0,
                      background: `${ACCENT}15`, border: `1px solid ${ACCENT}35`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 9, fontWeight: 700, color: ACCENT, marginTop: 1,
                    }}>{i + 1}</div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 500, color: TEXT_PRIM, marginBottom: 2 }}>{f.label}</div>
                      <div style={{ fontSize: 11.5, color: 'rgba(13,27,62,0.52)', lineHeight: 1.45 }}>{f.detail}</div>
                    </div>
                  </div>
                  {subs.map((sub, si) => (
                    <div key={si} style={{
                      display: 'flex', alignItems: 'flex-start', gap: 8,
                      padding: '5px 16px 5px 46px',
                      background: `${ACCENT}04`,
                      borderBottom: si < subs.length - 1 ? `1px solid rgba(13,27,62,0.03)` : `1px solid rgba(13,27,62,0.05)`,
                    }}>
                      <span style={{ fontSize: 11, color: `${ACCENT}88`, flexShrink: 0, marginTop: 1 }}>└</span>
                      <span style={{ fontSize: 11, color: 'rgba(13,27,62,0.6)', lineHeight: 1.45 }}>{sub}</span>
                    </div>
                  ))}
                </React.Fragment>
              );
            })}
          </div>
        )}

        {nodes.length > 0 && (
          <div style={{ padding: '8px 16px 10px', borderTop: `1px solid rgba(13,27,62,0.05)`, display: 'flex', gap: 5, flexWrap: 'wrap', alignItems: 'center' }}>
            <span style={{ fontSize: 10, color: TEXT_DIM, marginRight: 2 }}>맵 노드</span>
            {nodes.map((n, i) => (
              <span key={i} style={{
                fontSize: 10.5, padding: '2px 8px', borderRadius: 20,
                background: `${ACCENT}12`, border: `1px solid ${ACCENT}30`,
                color: ACCENT, fontWeight: 500,
              }}>{n}</span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function DoneNote() {
  return (
    <div style={{ padding: '8px 40px 4px' }}>
      <div style={{
        display: 'inline-block', padding: '7px 14px', borderRadius: 8,
        background: `${ACCENT}0d`, border: `1px solid ${ACCENT}33`,
        fontSize: 12.5, fontWeight: 500, color: ACCENT,
      }}>6단계 분석 완료</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
