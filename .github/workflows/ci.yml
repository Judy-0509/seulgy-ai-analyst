name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (compile + pytest)
    runs-on: ubuntu-latest
    env:
      # Dummy keys: the LLM client only requires a key to be present at
      # construction time; tests mock the actual network calls.
      ZHIPU_API_KEY: test-dummy-key-for-ci
      OPENAI_API_KEY: test-dummy-key-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"
      - name: Byte-compile sources
        run: python -m compileall -q src run_report.py run_suggest.py start.py
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy, advisory)
        run: mypy src
        continue-on-error: true
      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
