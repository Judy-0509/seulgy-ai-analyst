services:
  seulgy-ai-analyst:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_PIN_KEY: ${VITE_PIN_KEY}
    image: seulgy-ai-analyst:latest
    container_name: seulgy-ai-analyst
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../data/mi_news:/app/data/mi_news
      - ../reports:/app/reports
      - ../scripts:/app/scripts
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/archives/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
