<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Main bulb gradient: mint highlight → emerald → deep green -->
    <radialGradient id="bulb" cx="36%" cy="28%" r="74%">
      <stop offset="0%"   stop-color="#bbf7d0"/>
      <stop offset="38%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>
    <!-- Soft ambient glow behind bulb -->
    <radialGradient id="halo" cx="50%" cy="46%" r="50%">
      <stop offset="0%"   stop-color="#10b981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <!-- Base gradient: slightly darker -->
    <linearGradient id="base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>

  <!-- Ambient glow -->
  <circle cx="16" cy="14" r="15" fill="url(#halo)"/>

  <!-- Bulb body: round top, narrows to neck at bottom -->
  <path d="
    M 16 2
    C 9.5 2 4 7 4 13
    C 4 17.8 7 21 10.2 22.2
    L 10.2 24.6
    C 10.2 25.2 10.7 25.6 11.2 25.6
    L 20.8 25.6
    C 21.3 25.6 21.8 25.2 21.8 24.6
    L 21.8 22.2
    C 25 21 28 17.8 28 13
    C 28 7 22.5 2 16 2 Z
  " fill="url(#bulb)"/>

  <!-- Screw base — 3 stacked rounded bars -->
  <rect x="10.2" y="26.2" width="11.6" height="1.8" rx="0.9" fill="url(#base)"/>
  <rect x="11.2" y="28.6" width="9.6"  height="1.8" rx="0.9" fill="#047857"/>
  <rect x="12.4" y="31"   width="7.2"  height="1"   rx="0.5" fill="#065f46"/>

  <!-- Primary specular highlight (upper-left) -->
  <ellipse cx="12" cy="9" rx="4" ry="2.6"
    fill="white" opacity="0.30"
    transform="rotate(-12 12 9)"/>

  <!-- Secondary micro-highlight -->
  <circle cx="20.5" cy="7.5" r="1.6" fill="white" opacity="0.13"/>

  <!-- Inner luminescence glow (subtly suggests it's lit) -->
  <ellipse cx="16" cy="14.5" rx="5.5" ry="4.5" fill="white" opacity="0.05"/>
</svg>
